<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop – Saniya Armani Cosmetics</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ffe6f2;
            color: #333;
        }

        header {
            background: #ffb3d9;
            padding: 20px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            color: white;
            letter-spacing: 1px;
            cursor: pointer;
        }

        nav {
            background: #ff99cc;
            padding: 12px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 18px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
        }

        .container {
            width: 90%;
            margin: auto;
            padding: 30px 0;
        }

        h1 {
            text-align: center;
            color: #cc0066;
            font-size: 36px;
            margin-bottom: 40px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 35px;
        }

        .product-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 10px #ffb3d9;
        }

        .product-card img {
            width: 100%;
            border-radius: 12px;
        }

        .product-card h3 {
            margin-top: 15px;
            color: #cc0066;
            font-size: 22px;
        }

        .price {
            background: #ff99cc;
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            display: inline-block;
            margin: 10px 0;
            font-weight: bold;
        }

        .order-btn {
            background: #cc0066;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 16px;
            display: inline-block;
            margin-top: 10px;
        }

        footer {
            background: #ffb3d9;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
            color: white;
        }
    </style>
</head>
